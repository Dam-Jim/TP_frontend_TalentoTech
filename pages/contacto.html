<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <title>Contacto</title>
</head>
<body>
    
    <header>
        <div class="div-logo">
            <a href="../index.html" class="logo"><img src="../img/logo.png" alt="Logo JujutsuShop"> </a>
        </div>

        <nav class="header-nav">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="./contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="titulo-contacto text-secondary">Contactanos</h1>
        <form class="form-contacto" action="https://formspree.io/f/mkoyvqan" method="POST">

            <div class="grupo-input">
                <label for="email">Email: </label>
                <input type="email" id="email">
            </div>
            

             <div class="grupo-input">
                <label for="mensaje">Mensaje: </label>
                <input type="textarea" id="mensaje">
            </div>

            <button class="btn bg-secondary text-dark" type="submit">Enviar</button>
        </form>
    </main>

    <footer>
        <p>Sitio oficial de JujutsuShop</p>
        <nav>
            <ul class="footer-list">
                <li><img src="../img/whatsapp.png" alt="logo whatsapp"></li>
                 <li><img src="../img/instagram.png" alt="logo instagram"></li>
            </ul>
        </nav>
    </footer>
</body>
</html>
